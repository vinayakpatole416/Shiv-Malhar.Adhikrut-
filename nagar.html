<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - प्रशासकीय स्तर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf5e6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        .wing-title { background: #8e44ad; color: white; padding: 10px; margin-top: 20px; border-radius: 5px; font-weight: bold; }
        .post { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px dotted #ccc; }
        .post span:last-child { color: #555; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#8e44ad;">प्रशासकीय स्तर निवडा</h2>
    
    <label>१. स्तर निवडा:</label>
    <select id="mainLevel" onchange="loadSubLevels()">
        <option value="">-- निवडा --</option>
        <option value="mnp">महानगरपालिका (२९)</option>
        <option value="np">नगरपरिषद (२४६)</option>
        <option value="npanch">नगरपंचायत (१४७)</option>
    </select>

    <label>२. जिल्हा / क्षेत्र निवडा:</label>
    <select id="distLevel" onchange="loadUnits()"><option value="">-- जिल्हा निवडा --</option></select>

    <label>३. नेमके ठिकाण निवडा:</label>
    <select id="unitLevel" onchange="showData()"><option value="">-- ठिकाण निवडा --</option></select>

    <div id="output"></div>
</div>

<script>
    // डेटा स्ट्रक्चर - इथे तुम्ही तुमचे सर्व जिल्हे आणि तालुके भरू शकता
    const db = {
        mnp: { "मुंबई": ["मुंबई महानगरपालिका"], "पुणे": ["पुणे म.न.पा.", "पिंपरी-चिंचवड म.न.पा."] },
        np: { "पुणे": ["बारामती", "इंदापूर", "जुन्नर"], "सातारा": ["कराड", "सातारा"] },
        npanch: { "सातारा": ["खटाव", "माण"], "पुणे": ["वेल्हा"] }
    };

    const wings = ["मुख्य प्रतिष्ठान", "विद्यार्थी", "कन्या", "महिला", "शेतकरी", "कामगार", "आरोग्य", "परिवहन", "उद्योजक", "क्रीडा"];
    const posts = ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"];

    function loadSubLevels() {
        let main = document.getElementById('mainLevel').value;
        let dist = document.getElementById('distLevel');
        dist.innerHTML = '<option value="">-- जिल्हा निवडा --</option>';
        Object.keys(db[main] || {}).forEach(d => dist.innerHTML += `<option value="${d}">${d}</option>`);
    }

    function loadUnits() {
        let main = document.getElementById('mainLevel').value;
        let d = document.getElementById('distLevel').value;
        let unit = document.getElementById('unitLevel');
        unit.innerHTML = '<option value="">-- ठिकाण निवडा --</option>';
        (db[main][d] || []).forEach(u => unit.innerHTML += `<option value="${u}">${u}</option>`);
    }

    function showData() {
        let out = document.getElementById('output');
        out.innerHTML = '<h3 style="color:#8e44ad;">पदाधिकारी यादी</h3>';
        wings.forEach(w => {
            out.innerHTML += `<div class="wing-title">${w}</div>`;
            posts.forEach(p => out.innerHTML += `<div class="post"><span>${p}</span><span>[नाव]</span></div>`);
        });
    }
</script>
</body>
</html>
