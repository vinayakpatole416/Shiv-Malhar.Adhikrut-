<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>राजकीय पॅनेल - श्री शिवमल्हार</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl">
        <h2 class="text-2xl font-bold text-center text-purple-800 mb-6">राजकीय पॅनेल</h2>

        <div class="space-y-3 mb-8">
            <select class="w-full p-3 border-2 border-purple-500 rounded-xl font-bold bg-purple-50">
                <option>हिंदुस्थान (National)</option>
                <option>राज्य (States)</option>
                <option>लोकसभा (Lok Sabha)</option>
                <option>विधानसभा (Vidhan Sabha)</option>
                <option>महानगरपालिका (Municipal Corp.)</option>
                <option>नगरपालिका (Municipality)</option>
                <option>नगरपंचायत (Nagar Panchayat)</option>
                <option>ग्रामपंचायत (Gram Panchayat)</option>
            </select>
        </div>

        <div class="space-y-6">
            
            <script>
                const branches = [
                    "श्री शिवमल्हार स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार विध्यार्थी स्वराज्य प्रतिष्ठान",
                    "श्री शिवमल्हार कन्या स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार महिला स्वराज्य प्रतिष्ठान",
                    "श्री शिवमल्हार शेतकरी स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार कामगार स्वराज्य प्रतिष्ठान",
                    "श्री शिवमल्हार आरोग्य स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार परिवहन स्वराज्य प्रतिष्ठान",
                    "श्री शिवमल्हार उद्योजक स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार क्रीडा स्वराज्य प्रतिष्ठान"
                ];

                const posts = [
                    {m: "अध्यक्ष", s: "अध्यक्षः", e: "President"},
                    {m: "उपाध्यक्ष", s: "उपाध्यक्षः", e: "Vice President"},
                    {m: "सचिव", s: "सचिवः", e: "Secretary"},
                    {m: "उपसचिव", s: "उपसचिवः", e: "Asst. Secretary"},
                    {m: "शाखाप्रमुख", s: "शाखाप्रमुखः", e: "Branch Head"},
                    {m: "शाखाउपप्रमुख", s: "शाखाउपप्रमुखः", e: "Asst. Branch Head"},
                    {m: "कार्याध्यक्ष", s: "कार्याध्यक्षः", e: "Executive President"},
                    {m: "कार्याउपाध्यक्ष", s: "कार्याउपाध्यक्षः", e: "Exec. Vice President"},
                    {m: "सभासद", s: "सभासदः", e: "Member"},
                    {m: "उपसभासद", s: "उपसभासदः", e: "Sub-Member"}
                ];

                branches.forEach(branch => {
                    document.write(`
                        <div class="border-2 border-purple-100 rounded-xl p-4 bg-gray-50">
                            <h3 class="font-bold text-purple-900 border-b border-purple-200 mb-3 pb-2">${branch}</h3>
                            <div class="grid grid-cols-2 gap-2 text-xs">
                                ${posts.map(p => `
                                    <button class="bg-white border border-purple-200 p-2 rounded hover:bg-purple-100 transition text-left">
                                        <span class="block font-bold">${p.m}</span>
                                        <span class="text-[10px] text-amber-800">(${p.s} / ${p.e})</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>

        <a href="dashboard.html" class="mt-8 block text-center text-purple-700 font-bold underline">मुख्य डॅशबोर्ड (Back)</a>
    </div>

</body>
</html>
