<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - जिल्हा स्तर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf5e6; padding: 15px; }
        .header { background: #8e44ad; color: white; padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        .accordion { background: white; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; }
        .accordion-header { padding: 15px; background: #f4ecf7; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .accordion-content { padding: 15px; display: none; background: #fff; }
        .wing-title { font-weight: bold; color: #8e44ad; margin-top: 15px; border-bottom: 1px solid #8e44ad; padding-bottom: 5px; }
        .post { margin: 4px 0; padding: 5px; border-bottom: 1px dotted #ccc; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="header"><h1>📍 श्री शिवमल्हार स्वराज्य प्रतिष्ठान</h1></div>

<div id="app"></div>

<script>
    const districts = [
        "अहिल्यानगर", "अकोला", "अमरावती", "छत्रपती संभाजीनगर", "बीड", "भंडारा", "बुलढाणा", "चंद्रपूर", 
        "धुळे", "गडचिरोली", "गोंदिया", "हिंगोली", "जळगाव", "जालना", "कोल्हापूर", "लातूर", "मुंबई शहर", 
        "मुंबई उपनगर", "नागपूर", "नांदेड", "नंदुरबार", "नाशिक", "धाराशिव", "पालघर", "परभणी", "पुणे", 
        "रायगड", "रत्नागिरी", "सांगली", "सातारा", "सिंधुदुर्ग", "सोलापूर", "ठाणे", "वर्धा", "वाशिम", "यवतमाळ"
    ];

    const wings = [
        "श्री शिवमल्हार स्वराज्य प्रतिष्ठान - main",
        "श्री शिवमल्हार विध्यार्थी स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार कन्या स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार महिला स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार शेतकरी स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार कामगार स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार आरोग्य स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार परिवहन स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार उद्योजक स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार क्रीडा स्वराज्य प्रतिष्ठान"
    ];

    const posts = ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"];

    let app = document.getElementById('app');

    districts.forEach(district => {
        let wingsHtml = wings.map(wing => {
            let postsHtml = posts.map(p => `<div class="post"><span>${p}</span> <span>[नाव]</span></div>`).join('');
            return `<div class="wing-title">${wing}</div>${postsHtml}`;
        }).join('');

        app.innerHTML += `
            <div class="accordion">
                <div class="accordion-header" onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block') ? 'none' : 'block'">
                    ${district} <span>▼</span>
                </div>
                <div class="accordion-content">${wingsHtml}</div>
            </div>
        `;
    });
</script>

</body>
</html>
